# =============================================================================
# DVF+ Analytics — Kestra Pipeline Flow
# =============================================================================
# End-to-end orchestration for the DVF data pipeline. Tasks run sequentially
# (top to bottom) unless wrapped in a Parallel block. The DAG is:
#
#   setup -> download -> start_postgres -> restore
#         -> [export_tables || download_geojson]
#         -> stop_postgres -> upload -> load_bigquery -> dbt_transform
#
# Deploy this flow to Kestra:  make kestra-deploy
# Trigger a run:               make pipeline
# Monitor via web UI:          http://localhost:8080
# =============================================================================

id: dvf-pipeline
namespace: dvf
description: >
  End-to-end DVF data pipeline. Downloads the DVF+ SQL dump from Cerema,
  restores it into an ephemeral PostgreSQL container, exports tables to CSV,
  downloads GeoJSON admin boundaries, uploads everything to GCS, loads into
  BigQuery raw tables, and runs dbt transformations (staging, intermediate,
  marts).

# ---------------------------------------------------------------------------
# Pipeline input: select demo (1-2 departments, ~10 min) or full (all France)
# ---------------------------------------------------------------------------
inputs:
  - id: mode
    type: ENUM
    defaults: demo
    values:
      - demo
      - full
    description: >
      Pipeline mode. "demo" processes 1-2 departments (~10 min),
      "full" processes all of France (~2 hours).

# ---------------------------------------------------------------------------
# Task defaults: all shell tasks use the Process runner (execute directly
# inside the Kestra container, not in separate Docker containers). Env vars
# from docker-compose.yml are inherited automatically. Only DVF_MODE needs
# explicit injection since it depends on the flow input.
# ---------------------------------------------------------------------------
taskDefaults:
  - type: io.kestra.plugin.scripts.shell.Commands
    values:
      taskRunner:
        type: io.kestra.plugin.core.runner.Process
      beforeCommands:
        - cd /app/project
      env:
        DVF_MODE: "{{ inputs.mode }}"

# =============================================================================
# Pipeline Tasks (sequential unless wrapped in Parallel)
# =============================================================================
tasks:
  # --- Step 0: Install Python dependencies ----------------------------------
  # The custom Kestra image has Python and uv, but project dependencies
  # (psycopg2, google-cloud, dbt, etc.) must be installed from requirements.txt.
  - id: setup
    type: io.kestra.plugin.scripts.shell.Commands
    description: Install Python dependencies in the container venv
    commands:
      - uv venv --python python3
      - uv pip install -r requirements.txt

  # --- Step 1: Download the DVF+ SQL dump from Cerema Box -----------------
  # Network-dependent: retry 3 times with 30s delay on failure.
  - id: download
    type: io.kestra.plugin.scripts.shell.Commands
    description: Download DVF+ SQL dump from Cerema
    retry:
      type: constant            # Fixed delay between retries (not exponential)
      maxAttempt: 3             # Try up to 3 times total
      interval: PT30S           # Wait 30 seconds between attempts
    commands:
      - uv run python -m ingestion.download_dvf

  # --- Step 2: Start the ephemeral PostgreSQL container --------------------
  # Uses Docker-from-Docker (host socket mounted) to start the PostGIS
  # container defined in docker-compose.yml. Waits for it to accept
  # connections before proceeding.
  - id: start_postgres
    type: io.kestra.plugin.scripts.shell.Commands
    description: Start ephemeral PostgreSQL container and wait for healthy
    commands:
      - docker compose up -d postgres --wait

  # --- Step 3: Restore the SQL dump into PostgreSQL ------------------------
  # Uses psql to load the .sql dump. In demo mode, only the departments
  # listed in DVF_DEMO_DEPARTMENTS are restored.
  - id: restore
    type: io.kestra.plugin.scripts.shell.Commands
    description: Restore DVF+ SQL dump into PostgreSQL container
    retry:
      type: constant
      maxAttempt: 3
      interval: PT30S
    commands:
      - uv run python -m ingestion.restore_dump

  # --- Step 4: Export CSV + download GeoJSON (parallel) --------------------
  # These two tasks are independent and run concurrently:
  #   - export_tables:    COPY FROM PostgreSQL to local CSV files
  #   - download_geojson: fetch admin boundary GeoJSON from Etalab (HTTP)
  # Both must complete before the pipeline proceeds to stop_postgres.
  - id: export_and_geojson
    type: io.kestra.plugin.core.flow.Parallel
    description: Export PostgreSQL tables to CSV and download GeoJSON boundaries (parallel)
    tasks:
      - id: export_tables
        type: io.kestra.plugin.scripts.shell.Commands
        description: Export PostgreSQL tables to CSV files
        commands:
          - uv run python -m ingestion.export_tables

      - id: download_geojson
        type: io.kestra.plugin.scripts.shell.Commands
        description: Download admin boundary GeoJSON files from Etalab
        commands:
          - uv run python -m ingestion.download_geojson

  # --- Step 5: Stop PostgreSQL (cleanup) -----------------------------------
  # The database is no longer needed — CSV exports are on disk.
  # Stopping early frees memory for the remaining GCS/BigQuery steps.
  # Uses stop + rm (not "down") to avoid killing Kestra itself.
  - id: stop_postgres
    type: io.kestra.plugin.scripts.shell.Commands
    description: Stop and remove ephemeral PostgreSQL container (cleanup)
    commands:
      - docker compose rm -sf postgres

  # --- Step 6: Upload to GCS data lake -------------------------------------
  # Uploads all CSV and GeoJSON files from data/ to the GCS bucket.
  # Files are organized by type: csv/ and geojson/ prefixes.
  - id: upload
    type: io.kestra.plugin.scripts.shell.Commands
    description: Upload CSV and GeoJSON files to GCS data lake
    commands:
      - uv run python -m ingestion.upload_to_gcs

  # --- Step 7: Load into BigQuery raw tables -------------------------------
  # Creates BigQuery tables from GCS files using load jobs.
  # Schema is auto-detected from CSV headers.
  - id: load_bigquery
    type: io.kestra.plugin.scripts.shell.Commands
    description: Load CSV and GeoJSON from GCS into BigQuery raw tables
    commands:
      - uv run python -m ingestion.load_to_bigquery

  # --- Step 8: Run dbt transformations -------------------------------------
  # Three-phase dbt pipeline:
  #   1. dbt deps  — install packages (dbt_utils)
  #   2. dbt run   — build staging views, intermediate models, and mart tables
  #   3. dbt test  — run data quality tests (unique, not_null, relationships)
  # If any test fails, the pipeline fails at this stage.
  - id: dbt_transform
    type: io.kestra.plugin.scripts.shell.Commands
    description: Run dbt transformations (staging, intermediate, marts) and tests
    commands:
      - cd dbt_dvf && uv run dbt deps && uv run dbt run && uv run dbt test
