# ------------------------------------------------------------------
# sources.yml — Declarations of raw BigQuery tables consumed by dbt.
#
# All tables live in the dvf_raw dataset. They are loaded by the
# ingestion scripts (load_to_bigquery.py) from GCS before dbt runs.
#
# Tables fall into three categories:
#   1. DVF+ transaction tables (mutation, disposition, local, etc.)
#      Loaded from Cerema DVF+ SQL dump via PostgreSQL export to CSV.
#   2. Reference / annotation tables (ann_*)
#      Look-up tables for codes used in the DVF+ schema.
#   3. Geographic boundary tables (geo_*)
#      Administrative boundaries loaded from Etalab GeoJSON files.
# ------------------------------------------------------------------

version: 2

sources:
  - name: dvf_raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: dvf_raw
    description: >
      Raw DVF+ tables loaded from GCS into BigQuery.
      Contains real estate transaction data from Cerema (2014-2025)
      and administrative boundary GeoJSON data from Etalab.

    tables:
      # ----- DVF+ core transaction tables -----

      - name: mutation
        description: >
          Main transaction table. One row per real estate mutation (sale deed).
          Partitioned by anneemut, clustered by coddep + codtypbien.
          This is the central table of the DVF+ schema; all other transaction
          tables reference it via idmutation.
        columns:
          - name: idmutation
            description: Primary key (integer, auto-generated by Cerema)
          - name: idopendata
            description: Open-data mutation identifier (business key, stable across releases)
          - name: datemut
            description: Transaction date (exported as string from CSV, needs parsing)
          - name: anneemut
            description: Transaction year (integer)
          - name: moismut
            description: Transaction month (integer, 1-12)
          - name: coddep
            description: Department code (e.g., '75', '13', '2A')
          - name: valeurfonc
            description: Transaction price in EUR (NULL or 0 for non-market transactions like donations)
          - name: codtypbien
            description: Property type code (GnDVF hierarchical classification, e.g. '111' = apartment)
          - name: libtypbien
            description: Property type label (human-readable name matching codtypbien)
          - name: latitude
            description: Latitude extracted from PostGIS geometry during ingestion (WGS84)
          - name: longitude
            description: Longitude extracted from PostGIS geometry during ingestion (WGS84)

      - name: disposition
        description: >
          Sub-transactions within a mutation. One row per disposition.
          A mutation can contain multiple dispositions when the deed covers
          several distinct items (e.g. building + adjacent land).
        columns:
          - name: iddispo
            description: Primary key (integer)
          - name: idmutation
            description: Foreign key to mutation
          - name: nodispo
            description: Disposition number within the mutation (ordinal position)

      - name: local
        description: >
          Premises (building units) involved in a disposition. One row per local.
          Includes type classification, room count, and built area.
        columns:
          - name: iddispoloc
            description: Primary key (integer)
          - name: idmutation
            description: Foreign key to mutation
          - name: codtyploc
            description: Premises type code (1=house, 2=apartment, 3=outbuilding, 4=commercial)

      - name: disposition_parcelle
        description: >
          Parcels involved in a disposition. One row per parcel-disposition link.
          Richer than the parcelle table: includes commune code, transaction dates,
          and cadastral land surface breakdowns (dcntsol, dcntagri, dcntnat).
        columns:
          - name: iddispopar
            description: Primary key (integer)
          - name: iddispo
            description: Foreign key to disposition
          - name: idmutation
            description: Foreign key to mutation
          - name: codcomm
            description: INSEE commune code (5-character string)

      - name: parcelle
        description: >
          Cadastral parcels. One row per unique parcel.
          Not used directly in staging (disposition_parcelle is preferred),
          but declared for completeness.
        columns:
          - name: idparcelle
            description: Primary key (integer)
          - name: idpar
            description: Parcel identifier string (cadastral reference)

      - name: adresse
        description: >
          Unique addresses linked to parcels and locals.
          Not used directly in staging models, but declared for completeness.
        columns:
          - name: idadr
            description: Primary key (integer)
          - name: codepostal
            description: Postal code (5-character string)

      # ----- DVF+ reference / annotation tables -----

      - name: ann_nature_mutation
        description: >
          Reference table for mutation type labels.
          Maps idnatmut codes to human-readable labels (e.g. 'Vente', 'VEFA').
        columns:
          - name: idnatmut
            description: Primary key (mutation nature code, integer)
          - name: libnatmut
            description: Mutation nature label (e.g. 'Vente', 'Echange', 'Adjudication')

      - name: ann_type_local
        description: >
          Reference table for premises type labels.
          Maps codtyploc to human-readable labels.
        columns:
          - name: codtyploc
            description: Primary key (local type code, integer)
          - name: libtyploc
            description: Local type label (e.g. 'Maison', 'Appartement')

      - name: ann_cgi
        description: >
          Reference table for tax code articles (Code General des Impots).
          Used for tax exemptions and special regimes.
        columns:
          - name: artcgi
            description: Primary key (article code, string)
          - name: libartcgi
            description: Article label (full text of the tax article reference)

      - name: ann_nature_culture
        description: >
          Reference table for land use types (nature de culture cadastrale).
          Describes how the land is used (e.g. garden, vineyard, arable).
        columns:
          - name: natcult
            description: Primary key (culture nature code, string)
          - name: libnatcult
            description: Culture nature label

      - name: ann_nature_culture_speciale
        description: >
          Reference table for special cultivation types.
          Refinement of ann_nature_culture for specific crop types.
        columns:
          - name: natcultspe
            description: Primary key (special culture code, string)
          - name: libnatcultspe
            description: Special culture label

      # ----- Geographic boundary tables -----

      - name: geo_departments
        description: >
          Department boundaries from Etalab GeoJSON (admin-express).
          Geometry stored as a JSON string; must be converted to BigQuery
          GEOGRAPHY type with ST_GEOGFROMGEOJSON in staging models.
        columns:
          - name: code
            description: Department code (e.g., '75', '13', '2A', '971')
          - name: nom
            description: Department name (official French name)
          - name: geometry
            description: GeoJSON geometry as a JSON string (MultiPolygon)

      - name: geo_communes
        description: >
          Commune boundaries from Etalab GeoJSON (admin-express).
          Geometry stored as a JSON string; must be converted to BigQuery
          GEOGRAPHY type with ST_GEOGFROMGEOJSON in staging models.
        columns:
          - name: code
            description: INSEE commune code (5-character string, e.g. '75056')
          - name: nom
            description: Commune name (official French name)
          - name: geometry
            description: GeoJSON geometry as a JSON string (MultiPolygon)
