# ------------------------------------------------------------------
# _staging__models.yml — Schema declarations and tests for staging models.
#
# Staging models rename raw French columns to English, cast types,
# and apply minimal filtering. They are materialized as views
# (configured in dbt_project.yml) to avoid data duplication.
#
# Relationship tests use severity: warn because the raw DVF+ data
# can contain orphan records (e.g. dispositions whose parent mutation
# was filtered out by the price > 0 condition in stg_dvf__mutations).
# ------------------------------------------------------------------

version: 2

models:
  - name: stg_dvf__mutations
    description: >
      Cleaned mutations table. Columns renamed to English, types cast,
      and non-market transactions filtered out (transaction_price_eur > 0).
      This is the foundation table for all downstream models.
    columns:
      - name: mutation_id
        description: Primary key, integer auto-generated by Cerema (from idmutation)
        tests:
          - unique
          - not_null
      - name: mutation_opendata_id
        description: Open-data business key, stable across DVF+ releases (from idopendata)
        tests:
          - not_null
      - name: transaction_date
        description: Transaction date parsed from the raw string column datemut
      - name: transaction_year
        description: Transaction year (integer, e.g. 2024)
        tests:
          - not_null
      - name: department_code
        description: Department code (e.g. '75', '2A', '971')
        tests:
          - not_null
      - name: transaction_price_eur
        description: Transaction price in EUR, always strictly positive after filtering
        tests:
          - not_null
      - name: property_type_code
        description: GnDVF hierarchical property type code (e.g. '111' for apartment)

  - name: stg_dvf__dispositions
    description: >
      Cleaned dispositions table. One row per sub-transaction within a mutation.
      A mutation can have multiple dispositions when the deed covers several
      distinct items.
    columns:
      - name: disposition_id
        description: Primary key (from iddispo)
        tests:
          - unique
          - not_null
      - name: mutation_id
        description: Foreign key to stg_dvf__mutations
        tests:
          - not_null
          - relationships:
              to: ref('stg_dvf__mutations')
              field: mutation_id
              severity: warn

  - name: stg_dvf__locals
    description: >
      Cleaned locals (premises) table. One row per building unit
      involved in a disposition. Includes room count and built area.
    columns:
      - name: local_id
        description: Primary key (from iddispoloc)
        tests:
          - unique
          - not_null
      - name: mutation_id
        description: Foreign key to stg_dvf__mutations
        tests:
          - not_null
          - relationships:
              to: ref('stg_dvf__mutations')
              field: mutation_id
              severity: warn
      - name: local_type_code
        description: Premises type code (1=house, 2=apartment, 3=outbuilding, 4=commercial)

  - name: stg_dvf__parcelles
    description: >
      Cleaned parcelles from the disposition_parcelle raw table. One row per
      parcel-disposition link. Includes commune code and cadastral land
      surface breakdowns (built, agricultural, natural).
    columns:
      - name: disposition_parcel_id
        description: Primary key (from iddispopar)
        tests:
          - unique
          - not_null
      - name: mutation_id
        description: Foreign key to stg_dvf__mutations
        tests:
          - not_null
          - relationships:
              to: ref('stg_dvf__mutations')
              field: mutation_id
              severity: warn
      - name: commune_code
        description: INSEE commune code (5-character string, from cadastre)
        tests:
          - not_null

  - name: stg_geo__departments
    description: >
      Department boundaries from Etalab GeoJSON. Geometry converted
      from raw JSON string to native BigQuery GEOGRAPHY type.
      Filtered to exclude rows with NULL department_code.
    columns:
      - name: department_code
        description: Department code, primary key (e.g. '75', '2A', '971')
        tests:
          - unique
          - not_null
      - name: department_name
        description: Official French department name
        tests:
          - not_null

  - name: stg_geo__communes
    description: >
      Commune boundaries from Etalab GeoJSON. Geometry converted
      from raw JSON string to native BigQuery GEOGRAPHY type.
      Filtered to exclude rows with NULL commune_code.
    columns:
      - name: commune_code
        description: INSEE commune code, primary key (5-character string)
        tests:
          - unique
          - not_null
      - name: commune_name
        description: Official French commune name
        tests:
          - not_null
