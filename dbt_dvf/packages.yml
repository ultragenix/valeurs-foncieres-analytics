# ------------------------------------------------------------------
# packages.yml — External dbt package dependencies.
#
# Install with: dbt deps
# Packages are downloaded to the dbt_packages/ directory.
# ------------------------------------------------------------------

packages:
  # dbt_utils: utility macros from dbt Labs.
  # Used in this project for:
  #   - date_spine: generates the dim_dates calendar dimension
  #   - expression_is_true: custom test on fct_transactions.transaction_price_eur
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]
