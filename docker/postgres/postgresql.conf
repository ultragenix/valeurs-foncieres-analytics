# =============================================================================
# PostgreSQL 16 -- Bulk-load-optimized configuration
# =============================================================================
# This configuration is tuned for the ephemeral DVF+ ingestion container.
# Data durability is NOT needed (data lives in GCS after export).
# DO NOT use these settings for any production PostgreSQL instance.
# =============================================================================

# ---------------------------------------------------------------------------
# Memory -- generous for bulk COPY operations
# ---------------------------------------------------------------------------
shared_buffers = 512MB
work_mem = 256MB
maintenance_work_mem = 512MB

# ---------------------------------------------------------------------------
# WAL -- minimize for ephemeral container (data loss is acceptable)
# ---------------------------------------------------------------------------
wal_level = minimal
max_wal_senders = 0
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# ---------------------------------------------------------------------------
# Durability -- disabled (ephemeral container, crash = re-run)
# ---------------------------------------------------------------------------
fsync = off
synchronous_commit = off
full_page_writes = off

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_checkpoints = on
log_min_duration_statement = 30000

# ---------------------------------------------------------------------------
# Connection
# ---------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 20
