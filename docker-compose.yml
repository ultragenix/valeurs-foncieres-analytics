# =============================================================================
# DVF+ Analytics — Docker Compose Services
# =============================================================================
# Three services:
#   1. postgres         Ephemeral DVF database (restore dump -> export CSV -> destroy)
#   2. kestra-postgres  Persistent metadata store for the Kestra orchestrator
#   3. kestra           DAG-based pipeline orchestrator (web UI on port 8080)
#
# Usage:
#   docker compose up -d postgres       # Start only the DVF database
#   docker compose up -d kestra         # Start Kestra + its internal DB
#   docker compose down                 # Stop all services
#   docker compose down -v              # Stop all + delete persistent volumes
# =============================================================================

name: dvf-analytics

services:
  # ---------------------------------------------------------------------------
  # DVF PostgreSQL -- ephemeral (no persistent volume)
  # Used only during ingestion: restore SQL dump, export to CSV, then destroyed.
  # No named volume is attached — all data is lost when the container stops.
  # This is intentional: the CSV exports are uploaded to GCS, making this DB
  # a temporary staging area only.
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./docker/postgres       # Custom image: PostgreSQL 16 + PostGIS 3
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dvf}                     # DB superuser name
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvf_local_only}  # Local-only password (never exposed)
      POSTGRES_DB: ${POSTGRES_DB:-dvf}                         # Database name for DVF+ data
    shm_size: 2g                        # Increased shared memory for bulk COPY operations
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      # Bind to localhost only — not exposed to the network
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dvf} -d ${POSTGRES_DB:-dvf}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kestra internal PostgreSQL -- persistent (metadata store for Kestra)
  # Stores Kestra's internal state: flow definitions, execution history, logs.
  # Uses a named volume (kestra_pg_data) so metadata survives container restarts.
  # ---------------------------------------------------------------------------
  kestra-postgres:
    image: postgres:16                  # Vanilla PostgreSQL — no PostGIS needed
    environment:
      POSTGRES_USER: ${KESTRA_DB_USER:-kestra}
      POSTGRES_PASSWORD: ${KESTRA_DB_PASSWORD:-kestra_local_only}
      POSTGRES_DB: ${KESTRA_DB_NAME:-kestra}
    volumes:
      - kestra_pg_data:/var/lib/postgresql/data   # Named volume for persistence
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KESTRA_DB_USER:-kestra} -d ${KESTRA_DB_NAME:-kestra}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kestra orchestrator -- DAG-based pipeline execution
  # Web UI: http://localhost:8080 (configurable via KESTRA_PORT in .env)
  # API:    http://localhost:8080/api/v1/
  # Deploy flows via: make kestra-deploy
  # Trigger runs via: make pipeline
  #
  # Custom image: includes Python 3, uv, Docker CLI, psql so that pipeline
  # tasks can run directly inside the Kestra container.
  # The host Docker socket is mounted so Kestra can manage the postgres
  # container (Docker-from-Docker pattern).
  # ---------------------------------------------------------------------------
  kestra:
    build:
      context: ./docker/kestra          # Custom image: Kestra + Python + Docker CLI
      dockerfile: Dockerfile
    ports:
      # Web UI and REST API — bind to localhost only
      - "127.0.0.1:${KESTRA_PORT:-8080}:8080"
    volumes:
      # Mount the project directory so Kestra tasks can access scripts and data
      - .:/app/project
      # Mount Docker socket for Docker-from-Docker (manage postgres container)
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist Python venv across container restarts (avoid re-installing deps)
      - kestra_venv:/app/project/.venv
    environment:
      # Inline YAML configuration: point Kestra at its internal PostgreSQL
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-postgres:5432/${KESTRA_DB_NAME:-kestra}
            driverClassName: org.postgresql.Driver
            username: ${KESTRA_DB_USER:-kestra}
            password: ${KESTRA_DB_PASSWORD:-kestra_local_only}
        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          variables:
            env-vars-prefix: ""
      # Pipeline environment variables (read by flow tasks via {{ envs.* }})
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION:-europe-west9}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: /app/project/gcp-sa-key.json
      BQ_DATASET_RAW: ${BQ_DATASET_RAW:-dvf_raw}
      BQ_DATASET_STAGING: ${BQ_DATASET_STAGING:-dvf_staging}
      BQ_DATASET_ANALYTICS: ${BQ_DATASET_ANALYTICS:-dvf_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-dvf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvf_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-dvf}
      # From inside Kestra, postgres is accessible via the compose service name
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      DVF_MODE: ${DVF_MODE:-demo}
      DVF_DEMO_DEPARTMENTS: ${DVF_DEMO_DEPARTMENTS:-974}
      DBT_PROFILES_DIR: /app/project/dbt_dvf
    working_dir: /app/project
    command: server standalone           # Single-node mode (no cluster)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/configs || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s                 # Give Kestra time to boot before first check
    depends_on:
      kestra-postgres:
        condition: service_healthy       # Wait for metadata DB to be ready

# Named volumes — persist across container restarts
volumes:
  kestra_pg_data:                        # Kestra metadata (execution history, flow state)
  kestra_venv:                           # Python venv for Kestra pipeline tasks
